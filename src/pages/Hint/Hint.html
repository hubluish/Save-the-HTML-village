<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Hint</title>
    <link rel="stylesheet" href="Hint.css">
</head>
<body>
  <div class="container">
    <!-- 상단 부분 -->
    <div class="top-area">
      <div class="left-rect"></div>
      <div class="center-rect"></div>
      <div class="step-bar">
        <div class="step-button left-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="51" height="52" viewBox="0 0 51 52" fill="none"> 
            <path d="M31.875 9L14.875 26L31.875 43" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="step-text">1/10</div>
        <div class="step-button right-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="53" height="54" viewBox="0 0 53 54" fill="none">
            <path d="M17.668 9.3335L35.3346 27.0002L17.668 44.6668" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- 중간 부분 -->
    <div class="middle-area">
      <div class="middle-rect"></div>
      <div class="middle-rect"></div>
    </div>

    <!-- 하단 부분 -->
    <div class="bottom-area">
      <div class="bottom-rect"></div>
    </div>
  </div>
  <script src="Hint.js"></script>
</body>
</html>
